services:
  postgres:
    image: postgres:16-alpine
    container_name: deathchallenge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: deathchallenge
      POSTGRES_USER: dc_user
      POSTGRES_PASSWORD: dc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc_user -d deathchallenge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
